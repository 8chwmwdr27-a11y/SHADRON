<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZED Admin | Real-time Monitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f1115;
            --panel: #16191f;
            --accent: #d4af37;
            --text-main: #e0e0e0;
            --text-dim: #94a3b8;
            --border: #2d333d;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            touch-action: pan-y; /* מונע זום בטאץ' כפול */
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            height: 55px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            flex-shrink: 0;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-left: 5px;
        }

        /* Intel Grid - מידע על המשתמש */
        .intel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--panel);
            gap: 1px;
            border-bottom: 1px solid var(--border);
        }

        .intel-item {
            padding: 10px 15px;
            background: var(--bg);
        }

        .intel-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            display: block;
        }

        .intel-value {
            font-size: 13px;
            font-weight: 600;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Chat Area */
        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #0c0e12;
        }

        .bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.4;
        }

        .user-bubble {
            align-self: flex-start;
            background: var(--panel);
            border: 1px solid var(--border);
        }

        .admin-bubble {
            align-self: flex-end;
            background: var(--accent);
            color: #000;
            font-weight: 500;
        }

        /* Input Area */
        .input-container {
            background: var(--panel);
            padding: 10px 15px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px; /* מונע זום באייפון */
            outline: none;
        }

        button {
            background: var(--accent);
            border: none;
            width: 45px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
        }

        @media (min-width: 768px) {
            .intel-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; letter-spacing: 1px;">ZED <span style="color: var(--accent)">ADMIN</span></div>
        <div style="font-size: 12px; color: var(--text-dim)">
            <span class="status-dot"></span> מחובר
        </div>
    </header>

    <!-- מידע שנאסף על המשתמש -->
    <section class="intel-grid">
        <div class="intel-item">
            <span class="intel-label">ID משתמש</span>
            <div class="intel-value" id="val-id">ממתין...</div>
        </div>
        <div class="intel-item">
            <span class="intel-label">מיקום</span>
            <div class="intel-value" id="val-loc">ממתין...</div>
        </div>
        <div class="intel-item">
            <span class="intel-label">מכשיר / דפדפן</span>
            <div class="intel-value" id="val-dev">ממתין...</div>
        </div>
        <div class="intel-item">
            <span class="intel-label">זמן הודעה</span>
            <div class="intel-value" id="val-time">--:--</div>
        </div>
    </section>

    <!-- צ'אט -->
    <main id="chat-flow">
        <div style="text-align: center; font-size: 11px; color: var(--text-dim); margin: 10px 0;">תחילת יומן פעילות</div>
    </main>

    <!-- מקלדת ניהול -->
    <div class="input-container">
        <input type="text" id="admin-input" placeholder="כתוב הודעה למשתמש..." autocomplete="off">
        <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const network = new BroadcastChannel('zed_network');
        const chatFlow = document.getElementById('chat-flow');
        const adminInput = document.getElementById('admin-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `bubble ${isUser ? 'user-bubble' : 'admin-bubble'}`;
            div.textContent = text;
            chatFlow.appendChild(div);
            chatFlow.scrollTop = chatFlow.scrollHeight;
        }

        // האזנה להודעות נכנסות
        network.onmessage = (event) => {
            const data = event.data;
            
            if (data.target === 'demo' && data.type === 'user_message') {
                appendMessage(data.content, true);
                
                // עדכון מידע משתמש אונליין
                document.getElementById('val-id').textContent = '#USER-' + Math.random().toString(36).substr(2, 4).toUpperCase();
                document.getElementById('val-loc').textContent = data.meta.location || 'Israel';
                document.getElementById('val-dev').textContent = data.meta.os + ' (' + data.meta.device + ')';
                document.getElementById('val-time').textContent = data.meta.timestamp;
            }
            
            if (data.target === 'chat' && data.type === 'ai_response') {
                appendMessage("[מערכת]: " + data.content, false);
            }
        };

        // שליחת הודעה מהמנהל
        function sendMessage() {
            const msg = adminInput.value.trim();
            if (!msg) return;

            network.postMessage({
                target: 'chat',
                type: 'admin_reply',
                content: msg
            });

            appendMessage(msg, false);
            adminInput.value = '';
        }

        sendBtn.onclick = sendMessage;
        adminInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
