<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZED | Command Center (Admin)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --admin-gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg-dark: #020406;
            --accent-blue: #00e1ff;
            --safe-green: #00ff88;
            --glass: rgba(15, 20, 25, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* רקע חלקיקים יוקרתי (זהב וכחול) */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Header פרימיום */
        header {
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--admin-gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.8);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* לוגו המותג ZED - גרסת אדמין */
        .logo-icon {
            width: 50px;
            height: 50px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
            border: 2px solid var(--admin-gold);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .logo-icon::before {
            content: 'Z';
            font-size: 26px;
            font-weight: 900;
            color: var(--admin-gold);
            text-shadow: 0 0 15px var(--admin-gold);
            z-index: 2;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            width: 115%;
            height: 115%;
            border: 1px dashed var(--admin-gold);
            border-radius: 50%;
            opacity: 0.5;
            animation: spin 12s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-text h1 {
            font-size: 22px;
            letter-spacing: 4px;
            color: var(--admin-gold);
            text-shadow: 0 0 10px var(--gold-glow);
        }

        /* חותמת אבטחה מקצועית */
        .security-seal {
            background: rgba(0, 255, 136, 0.03);
            border: 1px solid rgba(0, 255, 136, 0.2);
            padding: 8px 15px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            position: relative;
            overflow: hidden;
        }

        .security-seal::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.1), transparent);
            animation: scan 3s infinite;
        }

        @keyframes scan { 100% { left: 100%; } }

        .seal-top {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            color: var(--safe-green);
            font-weight: bold;
            text-transform: uppercase;
        }

        .live-pulse {
            width: 6px;
            height: 6px;
            background: var(--safe-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--safe-green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        /* מבנה התוכן */
        .main-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            flex: 1;
            overflow: hidden;
        }

        /* פאנל מטא-דאטה (צד ימין) */
        aside {
            background: rgba(5, 7, 10, 0.9);
            border-left: 1px solid rgba(212, 175, 55, 0.15);
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .section-header {
            font-size: 11px;
            color: var(--admin-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 8px;
        }

        .info-group {
            display: grid;
            gap: 15px;
        }

        .data-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .data-card:hover { border-color: var(--admin-gold); background: rgba(212, 175, 55, 0.03); }

        .data-label { font-size: 10px; color: #888; margin-bottom: 4px; }
        .data-value { font-size: 14px; color: #fff; font-family: 'Courier New', Courier, monospace; }

        /* אזור הצ'אט המרכזי */
        .chat-container {
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, rgba(0, 225, 255, 0.03) 0%, transparent 70%);
        }

        #messages-flow {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .bubble {
            max-width: 75%;
            padding: 18px 25px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.6;
            animation: slideIn 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .user-bubble {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 2px;
        }

        .admin-bubble {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(0, 0, 0, 0.4));
            border: 1px solid var(--admin-gold);
            border-bottom-right-radius: 2px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* שורת קלט אדמין */
        .input-bar {
            padding: 30px 50px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        #reply-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 18px 30px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        #reply-input:focus { border-color: var(--admin-gold); box-shadow: 0 0 20px var(--gold-glow); }

        .send-admin-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--admin-gold);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: black;
            transition: 0.3s;
            box-shadow: 0 0 25px var(--gold-glow);
        }

        .send-admin-btn:hover { transform: scale(1.1) rotate(-10deg); box-shadow: 0 0 40px var(--admin-gold); }

        /* גלילה מעוצבת */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--admin-gold); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <header>
        <div class="logo-area">
            <div class="logo-icon"></div>
            <div class="brand-text">
                <h1>ZED COMMAND</h1>
                <span style="font-size: 9px; color: var(--admin-gold); letter-spacing: 2px;">AUTHORITY ACCESS ONLY</span>
            </div>
        </div>
        <div class="security-seal">
            <div class="seal-top">
                <div class="live-pulse"></div>
                Encrypted Connection
            </div>
            <div style="font-size: 9px; color: #888; margin-top: 2px;">AES-256 DIGITAL SIGNATURE</div>
        </div>
    </header>

    <div class="main-layout">
        <aside id="info-panel">
            <div class="section-header">ניטור משתמש בזמן אמת</div>
            <div id="wait-msg" style="color: #555; font-size: 13px; text-align: center; margin-top: 20px;">
                <i class="fas fa-radar fa-spin" style="margin-bottom: 10px; font-size: 20px; display: block;"></i>
                סורק תדרים להודעות נכנסות...
            </div>
            
            <div id="meta-display" style="display: none;" class="info-group">
                <div class="data-card">
                    <div class="data-label">מזהה פנייה</div>
                    <div class="data-value" id="res-id">#ZED-88219</div>
                </div>
                <div class="data-card">
                    <div class="data-label">מיקום משוער (GPS)</div>
                    <div class="data-value" id="res-loc">מזהה...</div>
                </div>
                <div class="data-card">
                    <div class="data-label">מכשיר ומערכת הפעלה</div>
                    <div class="data-value" id="res-device">-</div>
                </div>
                <div class="data-card">
                    <div class="data-label">דוא"ל גוגל</div>
                    <div class="data-value" id="res-email" style="color: var(--admin-gold);">shimon@google.com</div>
                </div>
                <div class="data-card">
                    <div class="data-label">זמן מקומי</div>
                    <div class="data-value" id="res-time">-</div>
                </div>
            </div>
        </aside>

        <section class="chat-container">
            <div id="messages-flow">
                <!-- הודעות יופיעו כאן -->
            </div>

            <div class="input-bar">
                <input type="text" id="reply-input" placeholder="השב כפקודת אדמין..." autocomplete="off">
                <button class="send-admin-btn" id="send-admin">
                    <i class="fas fa-bolt"></i>
                </button>
            </div>
        </section>
    </div>

    <script>
        const network = new BroadcastChannel('zed_network');
        const messagesFlow = document.getElementById('messages-flow');
        const replyInput = document.getElementById('reply-input');
        const sendBtn = document.getElementById('send-admin');
        const metaDisplay = document.getElementById('meta-display');
        const waitMsg = document.getElementById('wait-msg');

        // קנבס חלקיקים (זהב ואפור)
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.color = Math.random() > 0.5 ? '#d4af37' : '#ffffff';
                this.opacity = Math.random() * 0.3;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        initCanvas();
        animate();
        window.onresize = initCanvas;

        // לוגיקת הודעות
        function appendMsg(text, sender) {
            const div = document.createElement('div');
            div.className = `bubble ${sender}-bubble`;
            div.textContent = text;
            messagesFlow.appendChild(div);
            messagesFlow.scrollTop = messagesFlow.scrollHeight;
        }

        network.onmessage = (event) => {
            const d = event.data;
            if (d.target === 'demo' && d.type === 'user_message') {
                appendMsg(d.content, 'user');
                
                // עדכון פאנל מטא-דאטה
                waitMsg.style.display = 'none';
                metaDisplay.style.display = 'grid';
                document.getElementById('res-loc').textContent = d.meta.location;
                document.getElementById('res-device').textContent = `${d.meta.os} (${d.meta.device})`;
                document.getElementById('res-time').textContent = `${d.meta.date} ${d.meta.timestamp}`;
            }
            // הצגת תגובת ה-AI בשידור חי לאדמין
            if (d.target === 'chat' && d.type === 'ai_response') {
                appendMsg(`[SYSTEM AI]: ${d.content}`, 'admin');
            }
        };

        function sendReply() {
            const val = replyInput.value.trim();
            if (!val) return;
            
            network.postMessage({ target: 'chat', type: 'admin_reply', content: val });
            appendMsg(val, 'admin');
            replyInput.value = '';
        }

        sendBtn.onclick = sendReply;
        replyInput.onkeypress = (e) => { if (e.key === 'Enter') sendReply(); };

    </script>
</body>
</html>
