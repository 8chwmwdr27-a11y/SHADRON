<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZED | AI Interface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glow-color: rgba(0, 225, 255, 0.6);
            --bg-dark: #05070a;
            --accent-blue: #00e1ff;
            --text-gray: #a0a0a0;
            --safe-green: #00ff88;
            --admin-gold: #d4af37;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; /* מונע זום בטאפ כפול */
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* רקע חלקיקים */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        header {
            padding: 10px 20px;
            border-bottom: 1px solid rgba(0, 225, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 7, 10, 0.85);
            backdrop-filter: blur(15px);
            z-index: 10;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 40px; height: 40px; border: 1px solid var(--accent-blue);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px var(--glow-color); position: relative;
        }
        .logo-icon::before { content: 'Z'; font-weight: 900; color: white; }

        /* כפתור כניסה לאדמין */
        .admin-trigger {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--admin-gold);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .admin-trigger:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--admin-gold); }

        /* מסך נעילה / אימות */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: none; /* יופעל ב-JS */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }

        .auth-card {
            width: 300px;
            text-align: center;
            animation: authPop 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes authPop { from { opacity: 0; transform: scale(0.9); } }

        .auth-header { color: var(--admin-gold); letter-spacing: 3px; font-size: 14px; margin-bottom: 20px; }

        #pin-display {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--admin-gold);
            padding: 15px;
            font-size: 24px;
            letter-spacing: 10px;
            color: var(--admin-gold);
            margin-bottom: 20px;
            border-radius: 8px;
            min-height: 60px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .key {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: white;
            padding: 20px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        .key:active { background: var(--admin-gold); color: black; }

        /* ממשק הצ'אט הקיים */
        main {
            flex: 1; display: flex; flex-direction: column;
            max-width: 900px; margin: 15px auto; width: 92%;
            background: rgba(10, 15, 20, 0.6); border: 1px solid rgba(0, 225, 255, 0.15);
            border-radius: 20px; position: relative; overflow: hidden;
        }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 85%; padding: 10px 15px; border-radius: 15px; font-size: 14.5px; animation: fadeIn 0.3s ease; }
        .user-message { align-self: flex-start; background: rgba(0, 225, 255, 0.1); border: 1px solid rgba(0, 225, 255, 0.25); }
        .ai-message { align-self: flex-end; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); }

        .input-area {
            padding: 15px; background: rgba(5, 7, 10, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; gap: 10px;
        }

        #user-input {
            flex: 1; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 18px; border-radius: 30px; color: white; outline: none; font-size: 16px;
        }

        #send-btn {
            width: 48px; height: 48px; border-radius: 50%; border: none;
            background: var(--accent-blue); cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <header>
        <div class="logo-container">
            <div class="logo-icon"></div>
            <div style="font-weight: 800; letter-spacing: 2px;">ZED</div>
        </div>
        <button class="admin-trigger" onclick="toggleAuth(true)">
            <i class="fas fa-shield-halved"></i>
            ADMIN
        </button>
    </header>

    <!-- שכבת אימות מאובטחת -->
    <div id="auth-overlay">
        <div class="auth-card">
            <div class="auth-header">אימות גישה למערכת</div>
            <div id="pin-display"></div>
            <div class="keypad">
                <button class="key" onclick="pressKey('1')">1</button>
                <button class="key" onclick="pressKey('2')">2</button>
                <button class="key" onclick="pressKey('3')">3</button>
                <button class="key" onclick="pressKey('4')">4</button>
                <button class="key" onclick="pressKey('5')">5</button>
                <button class="key" onclick="pressKey('6')">6</button>
                <button class="key" onclick="pressKey('7')">7</button>
                <button class="key" onclick="pressKey('8')">8</button>
                <button class="key" onclick="pressKey('9')">9</button>
                <button class="key" onclick="toggleAuth(false)" style="color:#ff4444">X</button>
                <button class="key" onclick="pressKey('0')">0</button>
                <button class="key" onclick="clearPin()"><i class="fas fa-backspace"></i></button>
            </div>
            <div style="margin-top: 30px; font-size: 10px; color: #444;">ZED SECURITY PROTOCOL v3.0</div>
        </div>
    </div>

    <main>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="שלח הודעה..." autocomplete="off">
            <button id="send-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </main>

    <script>
        const network = new BroadcastChannel('zed_network');
        let currentPin = "";

        // פונקציות אימות
        function toggleAuth(show) {
            const overlay = document.getElementById('auth-overlay');
            overlay.style.display = show ? 'flex' : 'none';
            if (!show) clearPin();
        }

        function pressKey(num) {
            if (currentPin.length < 4) {
                currentPin += num;
                document.getElementById('pin-display').textContent = "*".repeat(currentPin.length);
                
                if (currentPin.length === 4) {
                    if (currentPin === "2004") {
                        document.getElementById('pin-display').style.color = "var(--safe-green)";
                        document.getElementById('pin-display').textContent = "ACCESS GRANTED";
                        setTimeout(() => {
                            window.location.href = "demo.html";
                        }, 500);
                    } else {
                        document.getElementById('pin-display').style.color = "#ff4444";
                        document.getElementById('pin-display').textContent = "DENIED";
                        setTimeout(clearPin, 800);
                    }
                }
            }
        }

        function clearPin() {
            currentPin = "";
            const display = document.getElementById('pin-display');
            display.textContent = "";
            display.style.color = "var(--admin-gold)";
        }

        // --- לוגיקת הצ'אט והחלקיקים (נשאר זהה) ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.4;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(0, 225, 255, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        initCanvas();
        animate();
        window.addEventListener('resize', initCanvas);

        // שליחת הודעות
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}-message`;
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            userInput.value = '';

            // שליחת המטא-דאטה ל-demo.html
            network.postMessage({
                target: 'demo',
                type: 'user_message',
                content: text,
                meta: {
                    timestamp: new Date().toLocaleTimeString(),
                    date: new Date().toLocaleDateString(),
                    os: navigator.platform,
                    device: /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ? "Mobile" : "Desktop",
                    location: "Israel (Authorized Zone)"
                }
            });
        }

        sendBtn.onclick = handleSend;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') handleSend(); };

        network.onmessage = (e) => {
            if (e.data.target === 'chat') {
                addMessage(e.data.content, 'ai');
            }
        };

    </script>
</body>
</html>
