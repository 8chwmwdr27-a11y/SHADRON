<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- מותאם לנייד ללא אפשרות זום (user-scalable=no) למניעת קפיצות במקלדת -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZED | AI Interface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glow-color: rgba(0, 225, 255, 0.6);
            --bg-dark: #05070a;
            --accent-blue: #00e1ff;
            --text-gray: #a0a0a0;
            --safe-green: #00ff88;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* רקע חלקיקים ותדרים */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Head - מסגרת דקה */
        header {
            padding: 10px 20px;
            border-bottom: 1px solid rgba(0, 225, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0, 225, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 7, 10, 0.85);
            backdrop-filter: blur(15px);
            z-index: 10;
        }

        /* לוגו AI מעוצב */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(0,225,255,0.2) 0%, transparent 70%);
            border: 1px solid var(--accent-blue);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--glow-color), inset 0 0 10px var(--glow-color);
            animation: logoPulse 3s infinite ease-in-out;
        }

        .logo-icon::before {
            content: 'Z';
            font-size: 22px;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 10px var(--accent-blue);
            z-index: 2;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            width: 110%;
            height: 110%;
            border: 1px dashed var(--accent-blue);
            border-radius: 50%;
            opacity: 0.4;
            animation: spin 8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 25px var(--accent-blue); } }

        .brand-name {
            font-size: 20px;
            letter-spacing: 3px;
            font-weight: 800;
            text-shadow: 0 0 10px var(--glow-color);
        }

        /* חותמת אבטחה */
        .version-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .security-badge {
            font-size: 9px;
            color: var(--safe-green);
            background: rgba(0, 255, 136, 0.05);
            padding: 2px 8px;
            border: 0.5px solid rgba(0, 255, 136, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .live-dot {
            width: 5px;
            height: 5px;
            background-color: var(--safe-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--safe-green);
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* מסגרת הצ'אט */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 15px auto;
            width: 92%;
            background: rgba(10, 15, 20, 0.6);
            border: 1px solid rgba(0, 225, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 225, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .ai-core-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 225, 255, 0.08) 0%, transparent 70%);
            z-index: 0;
            animation: pulseCore 4s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes pulseCore { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.2; } 50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.5; } }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14.5px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .user-message { align-self: flex-start; background: rgba(0, 225, 255, 0.1); border: 1px solid rgba(0, 225, 255, 0.25); border-bottom-left-radius: 2px; }
        .ai-message { align-self: flex-end; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-bottom-right-radius: 2px; }

        #thinking-process { padding: 10px 15px; display: none; flex-direction: column; gap: 4px; z-index: 2; }
        .step { font-size: 12px; color: var(--text-gray); display: flex; align-items: center; gap: 8px; }

        .input-area {
            padding: 15px;
            background: rgba(5, 7, 10, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #user-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 18px;
            border-radius: 30px;
            color: white;
            outline: none;
            font-size: 16px; /* חשוב למניעת זום באייפון */
            transition: 0.3s;
        }

        #user-input:focus { border-color: var(--accent-blue); background: rgba(255, 255, 255, 0.08); }

        #send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--accent-blue);
            color: black;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 225, 255, 0.3);
            flex-shrink: 0;
        }

        #send-btn:active { transform: scale(0.9); opacity: 0.8; }
        #send-btn:disabled { background: #222; color: #555; box-shadow: none; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 225, 255, 0.15); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <header>
        <div class="logo-container">
            <div class="logo-icon"></div>
            <div class="brand-name">ZED</div>
        </div>
        <div class="version-area">
            <div style="font-size: 11px; color: var(--text-gray); font-weight: bold; letter-spacing: 1px;">CORE VERSION 3.0</div>
            <div class="security-badge">
                <div class="live-dot"></div>
                Secure Connection
            </div>
        </div>
    </header>

    <main>
        <div class="ai-core-bg"></div>
        <div id="chat-window"></div>
        <div id="thinking-process"></div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="שלח הודעה..." autocomplete="off">
            <button id="send-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </main>

    <script>
        const network = new BroadcastChannel('zed_network');
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.opacity = Math.random() * 0.4;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(0, 225, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 70; i++) particles.push(new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animateParticles();

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const thinkingBox = document.getElementById('thinking-process');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}-message`;
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function startThinking(text) {
            thinkingBox.style.display = 'flex';
            thinkingBox.innerHTML = '';
            const steps = ["מעבד...", "מנתח...", "ליבת ZED חושבת...", "מפעיל מקורות...", "מכין תשובה..."];
            const calcTime = Math.min(15000, Math.max(5000, text.length * 80));
            const stepDuration = calcTime / steps.length;

            for (let i = 0; i < steps.length; i++) {
                const stepEl = document.createElement('div');
                stepEl.className = 'step';
                stepEl.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>${steps[i]}</span>`;
                thinkingBox.appendChild(stepEl);
                await new Promise(r => setTimeout(r, stepDuration));
                stepEl.innerHTML = `<i class="fas fa-check" style="color:var(--safe-green)"></i> <span>${steps[i]}</span>`;
            }
            return true;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            addMessage(text, 'user');

            // שליחת נתונים ל-demo ול-engine
            network.postMessage({ target: 'demo', type: 'user_message', content: text, meta: { time: new Date().toLocaleTimeString(), os: navigator.platform } });
            network.postMessage({ target: 'engine', type: 'process_request', content: text });

            await startThinking(text);
        }

        network.onmessage = (event) => {
            if (event.data.target === 'chat') {
                if (event.data.type === 'ai_response' || event.data.type === 'admin_reply') {
                    thinkingBox.style.display = 'none';
                    addMessage(event.data.content, 'ai');
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                }
            }
        };

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
